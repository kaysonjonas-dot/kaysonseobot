<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO 頁面分析工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1.main-title { text-align: center; color: white; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .subtitle { text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 30px; font-size: 1.1rem; }
        .input-section { background: white; border-radius: 16px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 1rem; color: #666; border-radius: 8px; transition: all 0.3s; }
        .tab.active { background: #667eea; color: white; }
        .tab:hover:not(.active) { background: #f0f0f0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input[type="url"], textarea { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; transition: border-color 0.3s; font-family: inherit; }
        input[type="url"]:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 200px; resize: vertical; }
        .hint { font-size: 0.875rem; color: #888; margin-top: 6px; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 40px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; font-weight: 600; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .results { display: none; }
        .results.active { display: block; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .card-title { font-size: 1.3rem; font-weight: 700; color: #333; display: flex; align-items: center; gap: 10px; }
        .card-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }
        .status-good { background: #d4edda; color: #155724; }
        .status-warning { background: #fff3cd; color: #856404; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-info { background: #d1ecf1; color: #0c5460; }
        .metric { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .metric:last-child { border-bottom: none; }
        .metric-label { font-weight: 600; color: #555; }
        .metric-value { font-family: 'Courier New', monospace; font-weight: 700; font-size: 1.1rem; }
        .content-box { background: #f8f9fa; border-radius: 10px; padding: 16px; margin-top: 12px; font-size: 0.95rem; line-height: 1.6; word-break: break-all; border-left: 4px solid #667eea; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .progress-good { background: #28a745; }
        .progress-warning { background: #ffc107; }
        .progress-error { background: #dc3545; }
        .heading-tree { margin-top: 15px; }
        .heading-item { padding: 10px 14px; margin: 6px 0; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; }
        .heading-tag { font-weight: 700; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; min-width: 40px; text-align: center; }
        .h1-tag { background: #dc3545; color: white; }
        .h2-tag { background: #fd7e14; color: white; }
        .h3-tag { background: #ffc107; color: #333; }
        .h4-tag { background: #17a2b8; color: white; }
        .h5-tag { background: #6f42c1; color: white; }
        .h6-tag { background: #6c757d; color: white; }
        .heading-text { flex: 1; color: #333; }
        .heading-length { font-size: 0.8rem; color: #888; font-family: monospace; }
        .indent-1 { margin-left: 0; }
        .indent-2 { margin-left: 25px; }
        .indent-3 { margin-left: 50px; }
        .indent-4 { margin-left: 75px; }
        .indent-5 { margin-left: 100px; }
        .indent-6 { margin-left: 125px; }
        .schema-item { background: #f8f9fa; border-radius: 10px; padding: 16px; margin: 10px 0; border-left: 4px solid #17a2b8; }
        .schema-type { font-weight: 700; color: #17a2b8; font-size: 1.05rem; margin-bottom: 8px; }
        .schema-format { display: inline-block; background: #e3f2fd; color: #1565c0; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-bottom: 10px; }
        .schema-code { background: #263238; color: #aed581; padding: 14px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 15px; }
        .issue-list { margin-top: 15px; }
        .issue-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; margin: 8px 0; border-radius: 8px; font-size: 0.95rem; }
        .issue-icon { font-size: 1.2rem; margin-top: 2px; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .summary-item { background: #f8f9fa; border-radius: 12px; padding: 20px; text-align: center; }
        .summary-number { font-size: 2rem; font-weight: 700; color: #667eea; }
        .summary-label { color: #666; font-size: 0.9rem; margin-top: 5px; }
        @media (max-width: 768px) { h1.main-title { font-size: 1.8rem; } .card { padding: 18px; } .heading-item { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">SEO 頁面分析工具</h1>
        <p class="subtitle">檢查 Meta、Heading 結構與 Schema 標記</p>

        <div class="input-section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('url')">輸入網址</button>
                <button class="tab" onclick="switchTab('html')">貼上 HTML</button>
            </div>

            <div id="url-tab" class="tab-content active">
                <div class="input-group">
                    <label for="url-input">頁面網址</label>
                    <input type="url" id="url-input" placeholder="https://example.com" />
                    <p class="hint">已使用 Cloudflare Worker 代理服務抓取外部網站。如果抓取失敗，請使用「貼上 HTML」方式。</p>
                </div>
            </div>

            <div id="html-tab" class="tab-content">
                <div class="input-group">
                    <label for="html-input">HTML 原始碼</label>
                    <textarea id="html-input" placeholder="將網頁的 HTML 原始碼貼上於此..."></textarea>
                    <p class="hint">在瀏覽器中按 Ctrl+U (或 Cmd+Option+U) 查看原始碼，全選複製後貼上。</p>
                </div>
            </div>

            <button class="btn" id="analyze-btn" onclick="analyze()">開始分析</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>分析中...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        // SEO 標準設定
        const STANDARDS = {
            title: { min: 10, max: 60, ideal: '30-60 字元' },
            description: { min: 50, max: 160, ideal: '120-160 字元' },
            h1: { min: 5, max: 70, ideal: '20-70 字元' }
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        async function analyze() {
            const urlTab = document.getElementById('url-tab').classList.contains('active');
            let html = '';

            if (urlTab) {
                const url = document.getElementById('url-input').value.trim();
                if (!url) { alert('請輸入網址'); return; }
                html = await fetchUrl(url);
            } else {
                html = document.getElementById('html-input').value.trim();
                if (!html) { alert('請貼上 HTML 原始碼'); return; }
            }

            if (!html) return;

            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');

            setTimeout(() => {
                try {
                    const results = performAnalysis(html);
                    renderResults(results);
                } catch (e) {
                    console.error('Analysis error:', e);
                    alert('分析時發生錯誤：' + e.message);
                }
                document.getElementById('loading').classList.remove('active');
                document.getElementById('results').classList.add('active');
            }, 300);
        }

        async function fetchUrl(url) {
            // 使用 Cloudflare Worker 代理
            try {
                const proxyUrl = 'https://steep-dust-b2bf.kaysonjonas.workers.dev/?url=' + encodeURIComponent(url);
                console.log('Fetching:', proxyUrl);
                const response = await fetch(proxyUrl);
                console.log('Response status:', response.status);
                if (response.ok) {
                    const html = await response.text();
                    console.log('Fetched HTML length:', html.length);
                    return html;
                }
            } catch (e) {
                console.error('Cloudflare Worker failed:', e);
            }

            alert('無法抓取該網址。請使用「貼上 HTML」方式進行分析。\n\n錯誤：代理服務無法存取該網站。');
            return '';
        }

        function performAnalysis(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            return {
                meta: analyzeMeta(doc),
                headings: analyzeHeadings(doc),
                schema: analyzeSchema(doc, html)
            };
        }

        function analyzeMeta(doc) {
            const title = doc.querySelector('title');
            const titleText = title ? title.textContent.trim() : '';
            
            // 加強版 description 偵測（大小寫不敏感 + 多種來源）
            let description = '';
            const allMetas = doc.querySelectorAll('meta');
            
            for (const meta of allMetas) {
                const name = meta.getAttribute('name');
                if (name && name.toLowerCase() === 'description') {
                    description = meta.getAttribute('content') || '';
                    break;
                }
            }
            
            if (!description) {
                for (const meta of allMetas) {
                    const property = meta.getAttribute('property');
                    if (property && property.toLowerCase() === 'og:description') {
                        description = meta.getAttribute('content') || '';
                        break;
                    }
                }
            }
            
            if (!description) {
                for (const meta of allMetas) {
                    const name = meta.getAttribute('name');
                    if (name && name.toLowerCase() === 'twitter:description') {
                        description = meta.getAttribute('content') || '';
                        break;
                    }
                }
            }

            const titleLength = titleText.length;
            const descLength = description.length;

            return {
                title: { content: titleText, length: titleLength, status: getStatus(titleLength, STANDARDS.title), exists: !!titleText },
                description: { content: description, length: descLength, status: getStatus(descLength, STANDARDS.description), exists: !!description }
            };
        }

        function analyzeHeadings(doc) {
            const headings = [];
            const h1Elements = doc.querySelectorAll('h1');
            const allHeadings = doc.querySelectorAll('h1, h2, h3, h4, h5, h6');
            let lastLevel = 0;
            const issues = [];

            allHeadings.forEach((h, index) => {
                const level = parseInt(h.tagName[1]);
                const text = h.textContent.trim();
                if (level > lastLevel + 1 && lastLevel !== 0) {
                    issues.push(`H${lastLevel} 直接跳到 H${level}，缺少 H${lastLevel + 1}`);
                }
                headings.push({ tag: h.tagName.toLowerCase(), level: level, text: text, length: text.length });
                lastLevel = level;
            });

            if (h1Elements.length === 0) issues.push('頁面缺少 H1 標題');
            else if (h1Elements.length > 1) issues.push(`頁面有 ${h1Elements.length} 個 H1 標題，建議只保留一個`);

            const h1Text = h1Elements.length > 0 ? h1Elements[0].textContent.trim() : '';
            return { headings: headings, h1Count: h1Elements.length, h1Text: h1Text, h1Length: h1Text.length, h1Status: getStatus(h1Text.length, STANDARDS.h1), issues: issues, structure: getHeadingStructure(headings) };
        }

        function getHeadingStructure(headings) {
            const structure = [];
            const stack = [{ level: 0, children: structure }];
            headings.forEach(h => {
                const item = { ...h, children: [] };
                while (stack.length > 1 && stack[stack.length - 1].level >= h.level) { stack.pop(); }
                stack[stack.length - 1].children.push(item);
                stack.push({ level: h.level, children: item.children });
            });
            return structure;
        }

        function analyzeSchema(doc, html) {
            const schemas = [];
            const jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
            jsonLdScripts.forEach((script, index) => {
                try {
                    const data = JSON.parse(script.textContent);
                    const types = extractSchemaTypes(data);
                    schemas.push({ format: 'JSON-LD', types: types, content: script.textContent.trim(), index: index + 1 });
                } catch (e) {
                    schemas.push({ format: 'JSON-LD', types: ['解析錯誤'], content: script.textContent.trim(), index: index + 1, error: true });
                }
            });

            const microdataElements = doc.querySelectorAll('[itemscope]');
            microdataElements.forEach((el, index) => {
                const type = el.getAttribute('itemtype') || '未知類型';
                schemas.push({ format: 'Microdata', types: [type.split('/').pop() || type], content: el.outerHTML.substring(0, 500) + (el.outerHTML.length > 500 ? '...' : ''), index: index + 1 });
            });

            const rdfaElements = doc.querySelectorAll('[typeof]');
            rdfaElements.forEach((el, index) => {
                const type = el.getAttribute('typeof') || '未知類型';
                schemas.push({ format: 'RDFa', types: [type.split(':').pop() || type], content: el.outerHTML.substring(0, 500) + (el.outerHTML.length > 500 ? '...' : ''), index: index + 1 });
            });

            return schemas;
        }

        function extractSchemaTypes(data) {
            const types = [];
            function extract(obj) {
                if (Array.isArray(obj)) { obj.forEach(extract); }
                else if (obj && typeof obj === 'object') {
                    if (obj['@type']) types.push(obj['@type']);
                    Object.values(obj).forEach(extract);
                }
            }
            extract(data);
            return types.length > 0 ? types : ['未知類型'];
        }

        function getStatus(length, standard) {
            if (length === 0) return 'missing';
            if (length < standard.min) return 'warning';
            if (length > standard.max) return 'error';
            return 'good';
        }

        function getStatusConfig(status) {
            const configs = {
                good: { class: 'status-good', text: '符合標準', icon: '✓' },
                warning: { class: 'status-warning', text: '字數過少', icon: '!' },
                error: { class: 'status-error', text: '字數過多', icon: '✕' },
                missing: { class: 'status-error', text: '缺少內容', icon: '✕' }
            };
            return configs[status] || configs.warning;
        }

        function renderResults(data) {
            const container = document.getElementById('results');
            const meta = data.meta;
            const headings = data.headings;
            const schemas = data.schema;
            let html = '';
            html += renderSummary(meta, headings, schemas);
            html += renderMetaCard('Meta Title', 'T', meta.title, STANDARDS.title, '#dc3545');
            html += renderMetaCard('Meta Description', 'D', meta.description, STANDARDS.description, '#fd7e14');
            html += renderH1Card(headings);
            html += renderHeadingStructure(headings);
            html += renderSchema(schemas);
            container.innerHTML = html;
        }

        function renderSummary(meta, headings, schemas) {
            const totalIssues = (meta.title.status !== 'good' ? 1 : 0) + (meta.description.status !== 'good' ? 1 : 0) + (headings.h1Status !== 'good' ? 1 : 0) + headings.issues.length;
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;">📊</div>
                            分析總覽
                        </div>
                        <span class="status-badge ${totalIssues === 0 ? 'status-good' : 'status-warning'}">
                            ${totalIssues === 0 ? '全部通過' : `${totalIssues} 個問題`}
                        </span>
                    </div>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-number">${meta.title.length}</div>
                            <div class="summary-label">Title 長度</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${meta.description.length}</div>
                            <div class="summary-label">Description 長度</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${headings.h1Count}</div>
                            <div class="summary-label">H1 數量</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${headings.headings.length}</div>
                            <div class="summary-label">總標題數</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${schemas.length}</div>
                            <div class="summary-label">Schema 數量</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMetaCard(title, icon, data, standard, color) {
            const status = getStatusConfig(data.status);
            const percentage = data.exists ? Math.min((data.length / standard.max) * 100, 100) : 0;
            const progressClass = data.status === 'good' ? 'progress-good' : data.status === 'warning' ? 'progress-warning' : 'progress-error';
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: ${color}; color: white;">${icon}</div>
                            ${title}
                        </div>
                        <span class="status-badge ${status.class}">${status.icon} ${status.text}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">字數</span>
                        <span class="metric-value">${data.length} / ${standard.max} 字元</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${percentage}%"></div>
                    </div>
                    <div class="metric" style="margin-top: 15px;">
                        <span class="metric-label">建議範圍</span>
                        <span class="metric-value" style="color: #667eea;">${standard.ideal}</span>
                    </div>
                    ${data.exists ? `
                        <div class="content-box">
                            <strong>內容：</strong><br/>
                            ${escapeHtml(data.content)}
                        </div>
                    ` : `
                        <div class="content-box" style="border-left-color: #dc3545;">
                            <strong>⚠️ 缺少 ${title}</strong><br/>
                            請在 &lt;head&gt; 中加入 &lt;${title === 'Meta Title' ? 'title' : 'meta name="description"'}&gt; 標籤
                        </div>
                    `}
                </div>
            `;
        }

        function renderH1Card(headings) {
            const status = getStatusConfig(headings.h1Status);
            const percentage = headings.h1Text ? Math.min((headings.h1Length / STANDARDS.h1.max) * 100, 100) : 0;
            const progressClass = headings.h1Status === 'good' ? 'progress-good' : headings.h1Status === 'warning' ? 'progress-warning' : 'progress-error';
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: #dc3545; color: white;">H1</div>
                            H1 標題
                        </div>
                        <span class="status-badge ${status.class}">${status.icon} ${status.text}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">數量</span>
                        <span class="metric-value" style="color: ${headings.h1Count === 1 ? '#28a745' : '#dc3545'};">${headings.h1Count} 個</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">字數</span>
                        <span class="metric-value">${headings.h1Length} / ${STANDARDS.h1.max} 字元</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${percentage}%"></div>
                    </div>
                    ${headings.h1Text ? `
                        <div class="content-box">
                            <strong>內容：</strong><br/>
                            ${escapeHtml(headings.h1Text)}
                        </div>
                    ` : ''}
                    ${headings.h1Count !== 1 ? `
                        <div class="issue-list">
                            <div class="issue-item" style="background: #f8d7da;">
                                <span class="issue-icon">⚠️</span>
                                <span>建議每個頁面只使用 <strong>一個 H1</strong> 標題</span>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderHeadingStructure(headings) {
            let treeHtml = renderHeadingTree(headings.structure);
            let issuesHtml = '';
            if (headings.issues.length > 0) {
                issuesHtml = `
                    <div style="margin-top: 20px;">
                        <h4 style="margin-bottom: 12px; color: #dc3545;">⚠️ 結構問題</h4>
                        ${headings.issues.map(issue => `
                            <div class="issue-item" style="background: #fff3cd;">
                                <span class="issue-icon">⚡</span>
                                <span>${escapeHtml(issue)}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: #6f42c1; color: white;">H</div>
                            Heading 結構
                        </div>
                        <span class="status-badge ${headings.issues.length === 0 ? 'status-good' : 'status-warning'}">
                            ${headings.issues.length === 0 ? '結構良好' : `${headings.issues.length} 個問題`}
                        </span>
                    </div>
                    <div class="heading-tree">
                        ${treeHtml || '<p style="color: #888;">沒有找到任何標題</p>'}
                    </div>
                    ${issuesHtml}
                </div>
            `;
        }

        function renderHeadingTree(structure, depth = 1) {
            if (!structure || structure.length === 0) return '';
            return structure.map(item => `
                <div class="heading-item indent-${Math.min(item.level, 6)}" style="background: ${getHeadingBg(item.level)};">
                    <span class="heading-tag h${item.level}-tag">H${item.level}</span>
                    <span class="heading-text">${escapeHtml(item.text)}</span>
                    <span class="heading-length">${item.length} 字</span>
                </div>
                ${renderHeadingTree(item.children, depth + 1)}
            `).join('');
        }

        function getHeadingBg(level) {
            const colors = { 1: '#ffebee', 2: '#fff3e0', 3: '#fffde7', 4: '#e0f7fa', 5: '#f3e5f5', 6: '#eceff1' };
            return colors[level] || '#f5f5f5';
        }

        function renderSchema(schemas) {
            if (schemas.length === 0) {
                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">
                                <div class="card-icon" style="background: #17a2b8; color: white;">S</div>
                                Schema 結構化資料
                            </div>
                            <span class="status-badge status-info">未檢測到</span>
                        </div>
                        <div class="empty-state">
                            <div class="empty-state-icon">🔍</div>
                            <p>未檢測到 Schema.org 結構化資料</p>
                            <p style="font-size: 0.9rem; margin-top: 10px;">建議加入 JSON-LD 格式結構化資料以提升搜尋結果顯示</p>
                        </div>
                    </div>
                `;
            }
            const schemaItems = schemas.map((schema, index) => `
                <div class="schema-item">
                    <div class="schema-type">${escapeHtml(schema.types.join(', '))}</div>
                    <span class="schema-format">${schema.format} #${schema.index}</span>
                    ${schema.error ? '<span class="status-badge status-error" style="margin-left: 10px;">JSON 解析錯誤</span>' : ''}
                    <div class="schema-code">${escapeHtml(schema.content)}</div>
                </div>
            `).join('');
            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: #17a2b8; color: white;">S</div>
                            Schema 結構化資料
                        </div>
                        <span class="status-badge status-good">${schemas.length} 個標記</span>
                    </div>
                    ${schemaItems}
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
