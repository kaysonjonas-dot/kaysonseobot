<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayson's SEO Analyzer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-tertiary: rgba(255, 255, 255, 0.3);
            --accent-blue: #007AFF;
            --accent-green: #34C759;
            --accent-orange: #FF9500;
            --accent-red: #FF3B30;
            --accent-purple: #AF52DE;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #000;
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(120, 119, 198, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 100, 150, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(80, 150, 255, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            position: relative;
            z-index: 1;
        }

        h1.main-title {
            text-align: center;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 60px;
            letter-spacing: -0.022em;
            line-height: 1.1;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 var(--glass-highlight),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
        }

        .input-section {
            composes: glass;
            padding: 40px;
            margin-bottom: 40px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 0.5px solid var(--glass-border);
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-family: inherit;
            letter-spacing: -0.01em;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0,0,0,0.1);
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.7);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { margin-bottom: 24px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
            letter-spacing: -0.01em;
        }

        input[type="url"], textarea {
            width: 100%;
            padding: 16px 18px;
            background: rgba(0, 0, 0, 0.35);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.5;
        }

        input[type="url"]::placeholder, textarea::placeholder {
            color: var(--text-tertiary);
        }

        input[type="url"]:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.45);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        textarea { min-height: 200px; resize: vertical; }

        .hint {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 8px;
            line-height: 1.5;
            font-weight: 400;
        }

        .btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            border: 0.5px solid rgba(255, 255, 255, 0.18);
            padding: 16px 32px;
            font-size: 15px;
            border-radius: 980px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            letter-spacing: -0.01em;
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.2), 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.02);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.25), 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .results { display: none; }
        .results.active { display: block; }

        .card {
            composes: glass;
            padding: 32px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 0.5px solid var(--glass-border);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.021em;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.15);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.1);
            letter-spacing: -0.01em;
        }

        .status-good {
            background: rgba(52, 199, 89, 0.12);
            color: var(--accent-green);
            border-color: rgba(52, 199, 89, 0.25);
        }

        .status-warning {
            background: rgba(255, 149, 0, 0.12);
            color: var(--accent-orange);
            border-color: rgba(255, 149, 0, 0.25);
        }

        .status-error {
            background: rgba(255, 59, 48, 0.12);
            color: var(--accent-red);
            border-color: rgba(255, 59, 48, 0.25);
        }

        .status-info {
            background: rgba(0, 122, 255, 0.12);
            color: var(--accent-blue);
            border-color: rgba(0, 122, 255, 0.25);
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .metric:last-child { border-bottom: none; }

        .metric-label {
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .metric-value {
            font-family: 'SF Mono', 'SFMono-Regular', 'Courier New', monospace;
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .content-box {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 18px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-all;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 100px;
            overflow: hidden;
            margin-top: 10px;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-good { background: linear-gradient(90deg, rgba(52, 199, 89, 0.7), rgba(52, 199, 89, 1)); }
        .progress-warning { background: linear-gradient(90deg, rgba(255, 149, 0, 0.7), rgba(255, 149, 0, 1)); }
        .progress-error { background: linear-gradient(90deg, rgba(255, 59, 48, 0.7), rgba(255, 59, 48, 1)); }

        .heading-tree { margin-top: 16px; }

        .heading-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 0.5px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .heading-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .heading-tag {
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            min-width: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.1);
            font-family: 'SF Mono', monospace;
            letter-spacing: 0.02em;
        }

        .h1-tag { background: rgba(255, 59, 48, 0.15); color: #ff6b6b; }
        .h2-tag { background: rgba(255, 149, 0, 0.15); color: #ffa94d; }
        .h3-tag { background: rgba(255, 204, 0, 0.15); color: #ffd43b; }
        .h4-tag { background: rgba(0, 122, 255, 0.15); color: #74c0fc; }
        .h5-tag { background: rgba(175, 82, 222, 0.15); color: #da77f2; }
        .h6-tag { background: rgba(142, 142, 147, 0.15); color: #adb5bd; }

        .heading-text {
            flex: 1;
            color: var(--text-primary);
            font-weight: 400;
        }

        .heading-length {
            font-size: 13px;
            color: var(--text-tertiary);
            font-family: 'SF Mono', monospace;
        }

        .indent-1 { margin-left: 0; }
        .indent-2 { margin-left: 20px; }
        .indent-3 { margin-left: 40px; }
        .indent-4 { margin-left: 60px; }
        .indent-5 { margin-left: 80px; }
        .indent-6 { margin-left: 100px; }

        .schema-item {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 20px;
            margin: 12px 0;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.05);
        }

        .schema-type {
            font-weight: 600;
            color: #74c0fc;
            font-size: 15px;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }

        .schema-format {
            display: inline-block;
            background: rgba(0, 122, 255, 0.12);
            color: #74c0fc;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            border: 0.5px solid rgba(0, 122, 255, 0.2);
            font-family: 'SF Mono', monospace;
        }

        .schema-code {
            background: rgba(0, 0, 0, 0.4);
            color: #a8e6cf;
            padding: 16px;
            border-radius: 12px;
            font-family: 'SF Mono', 'SFMono-Regular', 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-tertiary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .issue-list { margin-top: 16px; }

        .issue-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
        }

        .issue-icon {
            font-size: 18px;
            margin-top: 1px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loading.active { display: block; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-top: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 24px;
        }

        .summary-item {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .summary-item:hover {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .summary-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 6px;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 40px 0 20px;
            color: var(--text-tertiary);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .divider {
            height: 0.5px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 32px 0;
        }

        @media (max-width: 768px) {
            .container { padding: 40px 20px 30px; }
            h1.main-title { font-size: 32px; margin-bottom: 40px; }
            .input-section { padding: 28px; }
            .card { padding: 24px; }
            .heading-item { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Kayson's SEO Analyzer</h1>

        <div class="input-section glass">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('url')">Enter URL</button>
                <button class="tab" onclick="switchTab('html')">Paste HTML</button>
            </div>

            <div id="url-tab" class="tab-content active">
                <div class="input-group">
                    <label for="url-input">Page URL</label>
                    <input type="url" id="url-input" placeholder="https://example.com" />
                    <p class="hint">Fetches external pages via Cloudflare Worker proxy. If it fails, use "Paste HTML" instead.</p>
                </div>
            </div>

            <div id="html-tab" class="tab-content">
                <div class="input-group">
                    <label for="html-input">HTML Source</label>
                    <textarea id="html-input" placeholder="Paste the page HTML source here..."></textarea>
                    <p class="hint">Press Ctrl+U (or Cmd+Option+U) to view page source, select all and paste here.</p>
                </div>
            </div>

            <button class="btn" id="analyze-btn" onclick="analyze()">Analyze</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary); font-size: 15px;">Analyzing...</p>
        </div>

        <div class="results" id="results"></div>

        <div class="divider"></div>

        <div class="footer">
            <p>Developed by Kayson</p>
        </div>
    </div>

    <script>
        // SEO Standards
        const STANDARDS = {
            title: { min: 560, max: 580, ideal: '560-580 px' },
            description: { min: 1, max: 880, ideal: '< 880 px' },
            h1: { min: 5, max: 70, ideal: '20-70 chars' }
        };

        // Measure pixel width using DOM for accuracy
        function measurePixelWidth(text) {
            if (!text) return 0;
            const span = document.createElement('span');
            span.style.cssText = 'position:absolute;left:-9999px;top:0;visibility:hidden;white-space:nowrap;font-weight:600;font-size:20px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;';
            span.textContent = text;
            document.body.appendChild(span);
            const width = span.getBoundingClientRect().width;
            document.body.removeChild(span);
            return Math.round(width);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        async function analyze() {
            const urlTab = document.getElementById('url-tab').classList.contains('active');
            let html = '';

            if (urlTab) {
                const url = document.getElementById('url-input').value.trim();
                if (!url) { alert('Please enter a URL'); return; }
                html = await fetchUrl(url);
            } else {
                html = document.getElementById('html-input').value.trim();
                if (!html) { alert('Please paste HTML source'); return; }
            }

            if (!html) return;

            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');

            setTimeout(() => {
                try {
                    const results = performAnalysis(html);
                    renderResults(results);
                } catch (e) {
                    console.error('Analysis error:', e);
                    alert('Analysis error: ' + e.message);
                }
                document.getElementById('loading').classList.remove('active');
                document.getElementById('results').classList.add('active');
            }, 300);
        }

        async function fetchUrl(url) {
            try {
                const proxyUrl = 'https://steep-dust-b2bf.kaysonjonas.workers.dev/?url=' + encodeURIComponent(url);
                console.log('Fetching:', proxyUrl);
                const response = await fetch(proxyUrl);
                console.log('Response status:', response.status);
                if (response.ok) {
                    const html = await response.text();
                    console.log('Fetched HTML length:', html.length);
                    return html;
                }
            } catch (e) {
                console.error('Cloudflare Worker failed:', e);
            }
            alert('Unable to fetch URL. Please use "Paste HTML" instead.\n\nError: Proxy service cannot access this website.');
            return '';
        }

        function performAnalysis(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            return {
                meta: analyzeMeta(doc),
                headings: analyzeHeadings(doc),
                schema: analyzeSchema(doc, html)
            };
        }

        function analyzeMeta(doc) {
            const titles = doc.querySelectorAll('title');
            const titleText = titles.length > 0 ? titles[0].textContent.trim() : '';
            
            let description = '';
            let descCount = 0;
            const allMetas = doc.querySelectorAll('meta');
            
            for (const meta of allMetas) {
                const name = meta.getAttribute('name');
                if (name && name.toLowerCase() === 'description') {
                    if (descCount === 0) description = meta.getAttribute('content') || '';
                    descCount++;
                }
            }
            
            if (!description) {
                for (const meta of allMetas) {
                    const property = meta.getAttribute('property');
                    if (property && property.toLowerCase() === 'og:description') {
                        description = meta.getAttribute('content') || '';
                    }
                }
            }
            
            // Measure pixel widths
            const titlePx = measurePixelWidth(titleText);
            const descPx = measurePixelWidth(description);
            
            let titleStatus = getStatus(titlePx, STANDARDS.title);
            let descStatus = getStatus(descPx, STANDARDS.description);
            
            // Multiple check: force error if multiple tags detected
            if (titles.length > 1) titleStatus = 'error';
            if (descCount > 1) descStatus = 'error';
            
            return {
                title: { 
                    content: titleText, 
                    length: titlePx, 
                    status: titleStatus, 
                    exists: !!titleText,
                    count: titles.length
                },
                description: { 
                    content: description, 
                    length: descPx, 
                    status: descStatus, 
                    exists: !!description,
                    count: descCount
                }
            };
        }

        function analyzeHeadings(doc) {
            const headings = [];
            const h1Elements = doc.querySelectorAll('h1');
            const allHeadings = doc.querySelectorAll('h1, h2, h3, h4, h5, h6');
            let lastLevel = 0;
            const issues = [];

            allHeadings.forEach((h, index) => {
                const level = parseInt(h.tagName[1]);
                const text = h.textContent.trim();
                if (level > lastLevel + 1 && lastLevel !== 0) {
                    issues.push(`H${lastLevel} jumps to H${level}, missing H${lastLevel + 1}`);
                }
                headings.push({ tag: h.tagName.toLowerCase(), level: level, text: text, length: text.length });
                lastLevel = level;
            });

            if (h1Elements.length === 0) issues.push('Page is missing H1 heading');
            else if (h1Elements.length > 1) issues.push(`Page has ${h1Elements.length} H1 headings. Use only one.`);

            const h1Text = h1Elements.length > 0 ? h1Elements[0].textContent.trim() : '';
            return { 
                headings: headings, 
                h1Count: h1Elements.length, 
                h1Text: h1Text, 
                h1Length: h1Text.length, 
                h1Status: getStatus(h1Text.length, STANDARDS.h1), 
                issues: issues, 
                structure: getHeadingStructure(headings) 
            };
        }

        function getHeadingStructure(headings) {
            const structure = [];
            const stack = [{ level: 0, children: structure }];
            headings.forEach(h => {
                const item = { ...h, children: [] };
                while (stack.length > 1 && stack[stack.length - 1].level >= h.level) { stack.pop(); }
                stack[stack.length - 1].children.push(item);
                stack.push({ level: h.level, children: item.children });
            });
            return structure;
        }

        function analyzeSchema(doc, html) {
            const schemas = [];
            const jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
            jsonLdScripts.forEach((script, index) => {
                try {
                    const data = JSON.parse(script.textContent);
                    const types = extractSchemaTypes(data);
                    schemas.push({ format: 'JSON-LD', types: types, content: script.textContent.trim(), index: index + 1 });
                } catch (e) {
                    schemas.push({ format: 'JSON-LD', types: ['Parse Error'], content: script.textContent.trim(), index: index + 1, error: true });
                }
            });

            const microdataElements = doc.querySelectorAll('[itemscope]');
            microdataElements.forEach((el, index) => {
                const type = el.getAttribute('itemtype') || 'Unknown Type';
                schemas.push({ format: 'Microdata', types: [type.split('/').pop() || type], content: el.outerHTML.substring(0, 500) + (el.outerHTML.length > 500 ? '...' : ''), index: index + 1 });
            });

            const rdfaElements = doc.querySelectorAll('[typeof]');
            rdfaElements.forEach((el, index) => {
                const type = el.getAttribute('typeof') || 'Unknown Type';
                schemas.push({ format: 'RDFa', types: [type.split(':').pop() || type], content: el.outerHTML.substring(0, 500) + (el.outerHTML.length > 500 ? '...' : ''), index: index + 1 });
            });

            return schemas;
        }

        function extractSchemaTypes(data) {
            const types = [];
            function extract(obj) {
                if (Array.isArray(obj)) { obj.forEach(extract); }
                else if (obj && typeof obj === 'object') {
                    if (obj['@type']) types.push(obj['@type']);
                    Object.values(obj).forEach(extract);
                }
            }
            extract(data);
            return types.length > 0 ? types : ['Unknown Type'];
        }

        function getStatus(length, standard) {
            if (length === 0) return 'missing';
            if (length < standard.min) return 'warning';
            if (length > standard.max) return 'error';
            return 'good';
        }

        function getStatusConfig(status) {
            const configs = {
                good: { class: 'status-good', text: 'Good', icon: '✓' },
                warning: { class: 'status-warning', text: 'Too Short', icon: '!' },
                error: { class: 'status-error', text: 'Error', icon: '✕' },
                missing: { class: 'status-error', text: 'Missing', icon: '✕' }
            };
            return configs[status] || configs.warning;
        }

        function renderResults(data) {
            const container = document.getElementById('results');
            const meta = data.meta;
            const headings = data.headings;
            const schemas = data.schema;
            let html = '';
            html += renderSummary(meta, headings, schemas);
            html += renderMetaCard('Meta Title', 'T', meta.title, STANDARDS.title, '#FF3B30');
            html += renderMetaCard('Meta Description', 'D', meta.description, STANDARDS.description, '#FF9500');
            html += renderH1Card(headings);
            html += renderHeadingStructure(headings);
            html += renderSchema(schemas);
            container.innerHTML = html;
        }

        function renderSummary(meta, headings, schemas) {
            const totalIssues = 
                (meta.title.status !== 'good' ? 1 : 0) + 
                (meta.description.status !== 'good' ? 1 : 0) + 
                (headings.h1Status !== 'good' ? 1 : 0) + 
                headings.issues.length;
            return `
                <div class="card glass">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon">📊</div>
                            Overview
                        </div>
                        <span class="status-badge ${totalIssues === 0 ? 'status-good' : 'status-warning'}">
                            ${totalIssues === 0 ? 'All Pass' : `${totalIssues} Issues`}
                        </span>
                    </div>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-number">${meta.title.length}</div>
                            <div class="summary-label">Title (px)</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${meta.description.length}</div>
                            <div class="summary-label">Description (px)</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${headings.h1Count}</div>
                            <div class="summary-label">H1 Count</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${headings.headings.length}</div>
                            <div class="summary-label">Total Headings</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number">${schemas.length}</div>
                            <div class="summary-label">Schema Count</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMetaCard(title, icon, data, standard, color) {
            const status = getStatusConfig(data.status);
            const percentage = data.exists ? Math.min((data.length / standard.max) * 100, 100) : 0;
            const progressClass = data.status === 'good' ? 'progress-good' : data.status === 'warning' ? 'progress-warning' : 'progress-error';
            
            let multipleWarning = '';
            if (data.count > 1) {
                multipleWarning = `
                    <div class="issue-item" style="background: rgba(255, 59, 48, 0.08); border-color: rgba(255, 59, 48, 0.15); margin-top: 16px;">
                        <span class="issue-icon">⚠️</span>
                        <span>Multiple ${title} tags detected (${data.count}). Only one is allowed.</span>
                    </div>
                `;
            }
            
            return `
                <div class="card glass">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: ${color}18; color: ${color}; border-color: ${color}30;">${icon}</div>
                            ${title}
                        </div>
                        <span class="status-badge ${status.class}">${status.icon} ${status.text}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Pixel Width</span>
                        <span class="metric-value">${data.length} px / ${standard.max} px</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${percentage}%"></div>
                    </div>
                    <div class="metric" style="margin-top: 16px;">
                        <span class="metric-label">Ideal Range</span>
                        <span class="metric-value" style="color: var(--text-secondary);">${standard.ideal}</span>
                    </div>
                    ${data.exists ? `
                        <div class="content-box">
                            <strong style="color: var(--text-secondary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;">Content</strong><br/>
                            ${escapeHtml(data.content)}
                        </div>
                    ` : `
                        <div class="content-box" style="border-color: rgba(255, 59, 48, 0.2); background: rgba(255, 59, 48, 0.08);">
                            <strong style="color: #FF6B6B;">⚠ Missing ${title}</strong><br/>
                            Add &lt;${title === 'Meta Title' ? 'title' : 'meta name="description"'}&gt; tag in &lt;head&gt;
                        </div>
                    `}
                    ${multipleWarning}
                </div>
            `;
        }

        function renderH1Card(headings) {
            const status = getStatusConfig(headings.h1Status);
            const percentage = headings.h1Text ? Math.min((headings.h1Length / STANDARDS.h1.max) * 100, 100) : 0;
            const progressClass = headings.h1Status === 'good' ? 'progress-good' : headings.h1Status === 'warning' ? 'progress-warning' : 'progress-error';
            return `
                <div class="card glass">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: rgba(255, 59, 48, 0.15); color: #FF6B6B; border-color: rgba(255, 59, 48, 0.25);">H1</div>
                            H1 Heading
                        </div>
                        <span class="status-badge ${status.class}">${status.icon} ${status.text}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Count</span>
                        <span class="metric-value" style="color: ${headings.h1Count === 1 ? '#34C759' : '#FF6B6B'};">${headings.h1Count}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Length</span>
                        <span class="metric-value">${headings.h1Length} / ${STANDARDS.h1.max} chars</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${percentage}%"></div>
                    </div>
                    ${headings.h1Text ? `
                        <div class="content-box">
                            <strong style="color: var(--text-secondary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;">Content</strong><br/>
                            ${escapeHtml(headings.h1Text)}
                        </div>
                    ` : ''}
                    ${headings.h1Count !== 1 ? `
                        <div class="issue-list">
                            <div class="issue-item" style="background: rgba(255, 59, 48, 0.08); border-color: rgba(255, 59, 48, 0.15);">
                                <span class="issue-icon">⚠️</span>
                                <span>Use only <strong style="color: #FF6B6B;">one H1</strong> heading per page</span>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderHeadingStructure(headings) {
            let treeHtml = renderHeadingTree(headings.structure);
            let issuesHtml = '';
            if (headings.issues.length > 0) {
                issuesHtml = `
                    <div style="margin-top: 24px;">
                        <h4 style="margin-bottom: 14px; color: #FF6B6B; font-size: 15px; font-weight: 600;">⚠ Structure Issues</h4>
                        ${headings.issues.map(issue => `
                            <div class="issue-item" style="background: rgba(255, 149, 0, 0.08); border-color: rgba(255, 149, 0, 0.15);">
                                <span class="issue-icon">⚡</span>
                                <span>${escapeHtml(issue)}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            return `
                <div class="card glass">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: rgba(175, 82, 222, 0.15); color: #DA77F2; border-color: rgba(175, 82, 222, 0.25);">H</div>
                            Heading Structure
                        </div>
                        <span class="status-badge ${headings.issues.length === 0 ? 'status-good' : 'status-warning'}">
                            ${headings.issues.length === 0 ? 'Good Structure' : `${headings.issues.length} Issues`}
                        </span>
                    </div>
                    <div class="heading-tree">
                        ${treeHtml || '<p style="color: var(--text-tertiary);">No headings found</p>'}
                    </div>
                    ${issuesHtml}
                </div>
            `;
        }

        function renderHeadingTree(structure, depth = 1) {
            if (!structure || structure.length === 0) return '';
            return structure.map(item => `
                <div class="heading-item indent-${Math.min(item.level, 6)}">
                    <span class="heading-tag h${item.level}-tag">H${item.level}</span>
                    <span class="heading-text">${escapeHtml(item.text)}</span>
                    <span class="heading-length">${item.length} chars</span>
                </div>
                ${renderHeadingTree(item.children, depth + 1)}
            `).join('');
        }

        function renderSchema(schemas) {
            if (schemas.length === 0) {
                return `
                    <div class="card glass">
                        <div class="card-header">
                            <div class="card-title">
                                <div class="card-icon" style="background: rgba(0, 122, 255, 0.15); color: #74C0FC; border-color: rgba(0, 122, 255, 0.25);">S</div>
                                Schema Markup
                            </div>
                            <span class="status-badge status-info">Not Found</span>
                        </div>
                        <div class="empty-state">
                            <div class="empty-state-icon">🔍</div>
                            <p style="margin-bottom: 8px;">No Schema.org structured data detected</p>
                            <p style="font-size: 14px;">Add JSON-LD markup for better search results</p>
                        </div>
                    </div>
                `;
            }
            const schemaItems = schemas.map((schema, index) => `
                <div class="schema-item">
                    <div class="schema-type">${escapeHtml(schema.types.join(', '))}</div>
                    <span class="schema-format">${schema.format} #${schema.index}</span>
                    ${schema.error ? '<span class="status-badge status-error" style="margin-left: 10px;">JSON Parse Error</span>' : ''}
                    <div class="schema-code">${escapeHtml(schema.content)}</div>
                </div>
            `).join('');
            return `
                <div class="card glass">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-icon" style="background: rgba(0, 122, 255, 0.15); color: #74C0FC; border-color: rgba(0, 122, 255, 0.25);">S</div>
                            Schema Markup
                        </div>
                        <span class="status-badge status-good">${schemas.length} Markups</span>
                    </div>
                    ${schemaItems}
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
